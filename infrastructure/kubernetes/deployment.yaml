apiVersion: apps/v1
kind: Deployment
metadata:
  name: elyan
  namespace: elyan
  labels:
    app: elyan
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elyan
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: elyan
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: elyan
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: elyan
          image: ghcr.io/emrek0ca/elyan:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - secretRef:
                name: elyan-secrets
            - configMapRef:
                name: elyan-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data/elyan
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: elyan-data
---
apiVersion: v1
kind: Service
metadata:
  name: elyan
  namespace: elyan
  labels:
    app: elyan
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: elyan
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elyan
  namespace: elyan
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.elyan.ai
      secretName: elyan-tls
  rules:
    - host: api.elyan.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elyan
                port:
                  name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elyan-config
  namespace: elyan
data:
  ELYAN_ENV: "production"
  ELYAN_LOG_LEVEL: "INFO"
  ELYAN_METRICS_PORT: "9090"
  ELYAN_API_PORT: "8080"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elyan-data
  namespace: elyan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elyan
  namespace: elyan
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: elyan
  namespace: elyan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: elyan
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
