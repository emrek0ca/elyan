# Elyan Helm Chart — Varsayılan Değerler
# Üretim için ayrı bir values-prod.yaml oluşturun.

# ── Uygulama ─────────────────────────────────────────────────────────────────
replicaCount: 1

image:
  repository: ghcr.io/your-org/elyan
  pullPolicy: IfNotPresent
  tag: ""  # Boş = Chart.yaml appVersion kullanılır

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Gateway Port ─────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 18789
  targetPort: 18789

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: elyan.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: elyan-tls
      hosts:
        - elyan.example.com

# ── Kaynaklar ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# ── HPA ───────────────────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Persistence (bellek & log) ────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""     # "" = cluster default
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /home/elyan/.elyan

# ── Sırlar (Secret) ───────────────────────────────────────────────────────────
# Gerçek değerleri Helm --set ya da external-secrets ile verin.
secrets:
  create: true          # false ise mevcut secret adını seçin
  existingSecret: ""    # create=false ise bu secret kullanılır
  data:
    TELEGRAM_BOT_TOKEN: ""
    GROQ_API_KEY: ""
    GEMINI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    OPENAI_API_KEY: ""

# ── Ortam Değişkenleri ────────────────────────────────────────────────────────
env:
  ELYAN_ENV: production
  GATEWAY_PORT: "18789"
  LOG_LEVEL: info

# ── Health & Probe ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 18789
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 18789
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

# ── RBAC ─────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ── Pod Ayarları ─────────────────────────────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "18789"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
