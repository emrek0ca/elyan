name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── 1. Lint & Format ───────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort

      - name: ruff (lint)
        run: ruff check . --output-format=github

      - name: black (format check)
        run: black --check --diff .

      - name: isort (import order)
        run: isort --check-only --diff .

  # ─── 2. Type Check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies + mypy
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests types-aiofiles

      - name: mypy
        run: mypy core/ config/ security/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Tip hatası CI'ı engellemez ama raporlanır

  # ─── 3. Security Scan ───────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit + pip-audit
        run: pip install bandit pip-audit

      - name: bandit (SAST)
        run: bandit -r . -x .venv,tests,scripts -ll -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: pip-audit (CVE tarama)
        run: pip-audit -r requirements.txt --skip-editable || true

  # ─── 4. Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          ELYAN_ENV: test
        run: |
          pytest tests/ \
            --cov=core --cov=config --cov=security --cov=tools \
            --cov-report=xml --cov-report=term-missing \
            -v --tb=short \
            --ignore=tests/integration

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unit-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ─── 5. Benchmark Suite ─────────────────────────────────────────────────────
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark suite
        env:
          PYTHONPATH: ${{ github.workspace }}
          ELYAN_ENV: test
        run: python scripts/benchmark.py --json --output benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  # ─── 5b. Regression Pipeline ─────────────────────────────────────────────────
  regression:
    name: Regression Pipeline
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression capability pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
          ELYAN_ENV: test
        run: python scripts/regression_capability_pipeline.py

  # ─── 6. Docker Build ────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: elyan:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Docker image size report
        run: |
          docker image inspect elyan:${{ github.sha }} --format='Image size: {{.Size}}' 2>/dev/null || echo "Image inspect skipped (buildx)"

  # ─── 7. Integration Tests (PR only) ─────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          ELYAN_ENV: test
        run: |
          pytest tests/integration/ -v --tb=short || echo "No integration tests yet"

  # ─── 8. Release (main branch only) ──────────────────────────────────────────
  release:
    name: Docker Push (Release)
    runs-on: ubuntu-latest
    needs: [lint, test, regression, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
