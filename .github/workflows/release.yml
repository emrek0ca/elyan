name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Test
        run: npm run test

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Security check
        run: npm run security:check

      - name: Build
        run: npm run build

      - name: Package release artifacts
        run: |
          STAGING_DIR="release-staging"
          ASSET_DIR="release-assets"

          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='vps.md' \
            --exclude='VPS.md' \
            --exclude='server.md' \
            --exclude='secrets.md' \
            --exclude='credentials.md' \
            --exclude='*.pem' \
            --exclude='*.key' \
            --exclude='*.p12' \
            --exclude='*.pfx' \
            --exclude='storage' \
            --exclude='release-staging' \
            --exclude='release-assets' \
            ./ "${STAGING_DIR}/"

          tar -czf "${ASSET_DIR}/elyan-linux-x64.tar.gz" -C "${STAGING_DIR}" .

          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          staging_dir = Path("release-staging")
          asset_dir = Path("release-assets")
          zip_names = [
              "elyan-macos-arm64.zip",
              "elyan-macos-x64.zip",
              "elyan-windows-x64.zip",
          ]

          for name in zip_names:
              archive_path = asset_dir / name
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in staging_dir.rglob("*"):
                      if path.is_file():
                          archive.write(path, path.relative_to(staging_dir))
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/elyan-macos-arm64.zip
            release-assets/elyan-macos-x64.zip
            release-assets/elyan-linux-x64.tar.gz
            release-assets/elyan-windows-x64.zip

      - name: Publish
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve VPS deploy readiness
        id: vps_deploy
        run: |
          if [ -n "${ELYAN_VPS_HOST:-}" ] && [ -n "${ELYAN_VPS_USER:-}" ] && [ -n "${ELYAN_VPS_SSH_KEY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "VPS deploy secrets are not configured; skipping VPS deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ELYAN_VPS_HOST: ${{ secrets.ELYAN_VPS_HOST }}
          ELYAN_VPS_USER: ${{ secrets.ELYAN_VPS_USER }}
          ELYAN_VPS_SSH_KEY: ${{ secrets.ELYAN_VPS_SSH_KEY }}

      - name: Copy artifact to VPS
        if: steps.vps_deploy.outputs.enabled == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.ELYAN_VPS_HOST }}
          username: ${{ secrets.ELYAN_VPS_USER }}
          key: ${{ secrets.ELYAN_VPS_SSH_KEY }}
          source: release-assets/elyan-linux-x64.tar.gz
          target: /tmp

      - name: Deploy release on VPS
        if: steps.vps_deploy.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ELYAN_VPS_HOST }}
          username: ${{ secrets.ELYAN_VPS_USER }}
          key: ${{ secrets.ELYAN_VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            VERSION="${{ github.ref_name }}"
            DEPLOY_ROOT="${ELYAN_DEPLOY_ROOT:-/srv/elyan}"
            RELEASE_DIR="${DEPLOY_ROOT}/releases/${VERSION}"
            mkdir -p "${DEPLOY_ROOT}/releases"
            rm -rf "${RELEASE_DIR}"
            mkdir -p "${RELEASE_DIR}"
            tar -xzf "/tmp/elyan-linux-x64.tar.gz" -C "${RELEASE_DIR}"
            "${RELEASE_DIR}/ops/deploy-release.sh" "${VERSION}"
