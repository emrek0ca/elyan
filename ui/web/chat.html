<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elyan WebChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="h-screen flex flex-col p-6">
    <div class="max-w-4xl mx-auto w-full flex-1 flex flex-col glass rounded-[2rem] overflow-hidden">
        <header class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                <h1 class="font-semibold tracking-tight">ELYAN SECURE CHAT</h1>
            </div>
            <div class="text-xs text-slate-500 uppercase tracking-widest">End-to-End Encrypted</div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Messages -->
            <div class="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl max-w-[80%]">
                Merhaba! Ben Elyan. Web arayüzü üzerinden sana nasıl yardımcı olabilirim?
            </div>
        </div>

        <footer class="p-6 bg-white/[0.02] border-t border-white/5">
            <form id="chat-form" class="flex gap-4">
                <input type="text" id="user-input" placeholder="Elyan'a bir mesaj yaz..." 
                       class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500 transition">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl font-bold transition uppercase text-xs tracking-widest">Send</button>
            </form>
        </footer>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        
        // Connect to WebSocket
        const socket = new WebSocket(`ws://${window.location.host}/ws/chat?user_id=web_admin&user_name=Admin`);

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addMessage(data.text, 'bot');
        };

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            
            socket.send(JSON.stringify({ text: text }));
            addMessage(text, 'user');
            userInput.value = '';
        };

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = side === 'user' 
                ? 'ml-auto bg-white/5 border border-white/10 p-4 rounded-2xl max-w-[80%]' 
                : 'bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl max-w-[80%]';
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
