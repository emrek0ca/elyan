<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elyan Run Inspector</title>
  <link rel="stylesheet" href="/ui/web/ops_console.css" />
  <script src="/ui/web/runtime_config.js"></script>
  <style>
    .run-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .step-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .step-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .step-details { font-family: monospace; font-size: 0.9rem; background: #000; padding: 0.5rem; border-radius: 4px; overflow-x: auto; }
    .verification-tag { margin-top: 0.5rem; font-weight: bold; }
    .log-entry { font-family: monospace; font-size: 0.85rem; border-left: 2px solid #444; padding-left: 1rem; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="run-header">
      <div>
        <p class="eyebrow"><a href="/ops" style="color: inherit; text-decoration: none;">&larr; BACK TO OPS</a></p>
        <h1 id="run-title">Run Inspector</h1>
        <p id="run-meta" class="muted">Loading run data...</p>
      </div>
      <div id="run-status-pill" class="pill">PENDING</div>
    </header>

    <div class="workspace" style="grid-template-columns: 1fr 350px;">
      <main class="panel">
        <div class="panel-head">
          <h2>Execution Timeline</h2>
        </div>
        <div id="execution-timeline">
          <!-- Steps will be rendered here -->
        </div>
      </main>

      <aside class="panel">
        <div class="panel-head">
          <h2>Run Metadata</h2>
        </div>
        <div id="run-details" class="detail-block">
          <!-- Metadata details -->
        </div>
        
        <div class="panel-head" style="margin-top: 2rem;">
          <h2>Structured Logs</h2>
        </div>
        <div id="structured-logs" style="max-height: 500px; overflow-y: auto;">
          <!-- Logs will be rendered here -->
        </div>
      </aside>
    </div>
  </div>

  <script>
    const API_URL = typeof getElyanApiBaseUrl === 'function' ? getElyanApiBaseUrl() : '/api/v1';
    const runId = new URLSearchParams(window.location.search).get('run_id');

    async function loadRun() {
      if (!runId) {
        document.getElementById('run-title').textContent = "No Run ID Specified";
        return;
      }

      try {
        const response = await fetch(`${API_URL}/runs/${runId}`);
        if (!response.ok) {
          document.getElementById('run-title').textContent = "Run Not Found";
          return;
        }

        const data = await response.json();
        if (!data.success) {
          document.getElementById('run-title').textContent = `Error: ${data.error}`;
          return;
        }

        renderRun(data.run);
      } catch (err) {
        console.error('Error loading run:', err);
        document.getElementById('run-title').textContent = "Error Loading Run";
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return '-';
      return new Date(timestamp * 1000).toLocaleString();
    }

    function formatDuration(seconds) {
      if (!seconds) return '-';
      if (seconds < 60) return `${Math.floor(seconds)}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.floor(seconds % 60)}s`;
      return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
    }

    function renderRun(run) {
      document.getElementById('run-title').textContent = `Run ${run.run_id}`;
      document.getElementById('run-meta').textContent = `Session: ${run.session_id} | Intent: ${run.intent}`;

      const pill = document.getElementById('run-status-pill');
      pill.textContent = run.status.toUpperCase();
      const statusClass = run.status === 'completed' ? 'ok' : (run.status === 'error' ? 'err' : 'warn');
      pill.className = `pill ${statusClass}`;

      const details = document.getElementById('run-details');
      const duration = run.completed_at ? formatDuration(run.completed_at - run.started_at) : 'Running';

      details.innerHTML = `
        <p><strong>Run ID:</strong> <code>${run.run_id}</code></p>
        <p><strong>Session:</strong> ${run.session_id}</p>
        <p><strong>Intent:</strong> ${run.intent}</p>
        <p><strong>Status:</strong> ${run.status}</p>
        <p><strong>Started:</strong> ${formatDate(run.started_at)}</p>
        <p><strong>Duration:</strong> ${duration}</p>
        <p><strong>Steps:</strong> ${run.steps ? run.steps.length : 0}</p>
        <p><strong>Tool Calls:</strong> ${run.tool_calls ? run.tool_calls.length : 0}</p>
      `;

      if (run.error) {
        details.innerHTML += `<div class="pill err" style="margin-top: 1rem;">⚠️ Error: ${run.error}</div>`;
      }

      // Render execution timeline (steps)
      const timeline = document.getElementById('execution-timeline');
      if (run.steps && run.steps.length > 0) {
        timeline.innerHTML = run.steps.map((step, idx) => `
          <div class="step-card">
            <div class="step-header">
              <span><strong>Step ${idx + 1}:</strong> ${step.type || 'Unknown'}</span>
              ${step.status ? `<span class="pill ${step.status === 'completed' ? 'ok' : 'warn'}">${step.status}</span>` : ''}
            </div>
            ${step.description ? `<p>${step.description}</p>` : ''}
            ${step.data ? `<div class="step-details">${JSON.stringify(step.data, null, 2)}</div>` : ''}
          </div>
        `).join('');
      } else {
        timeline.innerHTML = '<p class="muted">No steps recorded</p>';
      }

      // Render tool calls (as logs)
      const logs = document.getElementById('structured-logs');
      if (run.tool_calls && run.tool_calls.length > 0) {
        logs.innerHTML = run.tool_calls.map(call => `
          <div class="log-entry">
            <span style="color: #60a5fa;">${call.tool}</span>
            <span style="color: #999;">${call.status === 'success' ? '✓' : '✗'}</span>
            ${call.error ? `<span style="color: #ef4444;">${call.error}</span>` : ''}
          </div>
        `).join('');
      } else {
        logs.innerHTML = '<p class="muted">No tool calls</p>';
      }
    }

    // Load run on page load
    loadRun();
    // Auto-refresh every 5 seconds
    setInterval(loadRun, 5000);
  </script>
</body>
</html>
