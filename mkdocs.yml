site_name: Elyan — Özerk AI Operatör
site_description: Elyan v18.0 geliştirici ve kullanıcı dokümantasyonu
site_author: Elyan Team
site_url: https://docs.elyan.ai

repo_name: your-org/elyan
repo_url: https://github.com/your-org/elyan
edit_uri: edit/main/docs/

theme:
  name: material
  language: tr
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Karanlık moda geç
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Aydınlık moda geç
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: tr
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Ana Sayfa: index.md
  - Başlangıç:
    - Kurulum: getting-started/installation.md
    - İlk Kullanım: getting-started/quickstart.md
    - Onboarding: getting-started/onboarding.md
  - CLI Referansı:
    - Genel Bakış: cli/overview.md
    - gateway: cli/gateway.md
    - channels: cli/channels.md
    - models: cli/models.md
    - skills: cli/skills.md
    - memory: cli/memory.md
    - security: cli/security.md
    - cron: cli/cron.md
    - doctor: cli/doctor.md
  - Kanallar:
    - Telegram: channels/telegram.md
    - Discord: channels/discord.md
    - Slack: channels/slack.md
    - WhatsApp: channels/whatsapp.md
    - Signal: channels/signal.md
    - Matrix: channels/matrix.md
    - Microsoft Teams: channels/teams.md
    - Google Chat: channels/google-chat.md
    - iMessage (BlueBubbles): channels/imessage.md
    - Web Sohbet: channels/webchat.md
  - Dashboard:
    - Genel Bakış: dashboard/overview.md
    - Analitik: dashboard/analytics.md
    - Güvenlik: dashboard/security.md
  - Güvenlik:
    - Güvenlik Mimarisi: security/architecture.md
    - Operator Modları: security/operator-modes.md
    - Sandbox: security/sandbox.md
    - Tool Politikaları: security/tool-policy.md
    - Denetim Logu: security/audit.md
  - Dağıtım:
    - Docker: deployment/docker.md
    - Kubernetes: deployment/kubernetes.md
    - Systemd: deployment/systemd.md
    - VPS (DigitalOcean): deployment/vps.md
  - Geliştirme:
    - Mimari: development/architecture.md
    - Katkı Rehberi: development/contributing.md
    - Test: development/testing.md
    - Kanal Adaptörü Yazma: development/writing-adapters.md
  - API Referansı:
    - Gateway API: api/gateway.md
    - WebSocket: api/websocket.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/elyan
  version:
    provider: mike
    default: stable
